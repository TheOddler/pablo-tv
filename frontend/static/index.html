<!DOCTYPE HTML>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Pablo TV</title>

  <link rel="stylesheet" href="/fontawesome/css/all.min.css">
  <link rel="stylesheet" href="/main.css">
  <script type="text/javascript" src="/main.js"></script>
</head>

<body>
  <script type="text/javascript">
    try {
      var app = Elm.Main.init({
        flags: {
          startTime: Date.now(),
          roots: localStorage.getItem('roots'),
          networkInfo: localStorage.getItem('network-info')
        }
      });
      app.ports.setLocalStorage.subscribe(function (keyAndData) {
        localStorage.setItem(keyAndData.key, keyAndData.data);
      });
    } catch (e) {
      const div = document.createElement('div');
      div.textContent = `Error initialising Elm:\t${e}`;
      document.body.appendChild(div);
      throw e;
    }
  </script>
  <script type="text/javascript" src="/arrow-nav.js"></script>
</body>

</html>
